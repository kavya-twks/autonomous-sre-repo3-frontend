name: Frontend CI/CD — Autonomous SRE

on:
  push:
    branches: [main, "fix/*"]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  REPO_NAME: repo3-frontend
  SERVICE_NAME: autonomous-sre-frontend
  CLUSTER_NAME: autonomous-sre-cluster

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # ── Stage 1: Dependency Prediction ────────────────────────────────────────
  dependency-prediction:
    name: "Stage 1 · Dependency Prediction"
    runs-on: ubuntu-latest
    outputs:
      safe_to_proceed: ${{ steps.predict.outputs.safe_to_proceed }}
      ecr_url: ${{ steps.ecr.outputs.ecr_url }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Get ECR URL from Repo 2 state
        id: ecr
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          pip install boto3 --quiet
          python3 - <<'PYEOF'
          import boto3, json, os
          try:
              s3 = boto3.client("s3", region_name="us-east-1")
              obj = s3.get_object(Bucket="autonomous-sre-tfstate", Key="app-infra/terraform.tfstate")
              state = json.loads(obj["Body"].read())
              outputs = state.get("outputs", {})
              ecr_url = outputs.get("frontend_ecr_url", {}).get("value", "")
              cluster = outputs.get("frontend_service_name", {}).get("value", "")
              print(f"ECR URL: {ecr_url}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"ecr_url={ecr_url}\n")
                  f.write(f"upstream_ready={'true' if ecr_url else 'false'}\n")
          except Exception as e:
              print(f"State read failed: {e}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("ecr_url=\nupstream_ready=false\n")
          PYEOF

      - name: Claude dependency check
        id: predict
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request
          ecr_url = """${{ steps.ecr.outputs.ecr_url }}""".strip()
          upstream_ready = bool(ecr_url)

          prompt = f"""Cross-repo dependency check for autonomous-sre.
          Repository: repo3-frontend (Next.js Docker app deployed to ECS)
          Upstream dependency: repo2-app-infra (provides ECR URL: {ecr_url or 'MISSING'})
          Upstream ready: {upstream_ready}
          Respond ONLY with JSON: {{"safe_to_proceed": {str(upstream_ready).lower()}, "risk_level": "LOW", "summary": "frontend build and deploy", "warnings": {json.dumps([] if upstream_ready else ["ECR URL not available from repo2"])}}}"""

          payload = json.dumps({"model": "claude-sonnet-4-20250514", "max_tokens": 300, "messages": [{"role": "user", "content": prompt}]}).encode()
          req = urllib.request.Request("https://api.anthropic.com/v1/messages", data=payload,
              headers={"Content-Type": "application/json", "x-api-key": os.environ["ANTHROPIC_API_KEY"], "anthropic-version": "2023-06-01"})
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())
          text = data["content"][0]["text"].strip()
          if "```" in text:
              text = text.split("```")[1]
              if text.startswith("json"): text = text[4:]
          result = json.loads(text.strip())
          print(json.dumps(result, indent=2))
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"safe_to_proceed={str(result['safe_to_proceed']).lower()}\n")
          PYEOF

  # ── Stage 2: Build & Push ─────────────────────────────────────────────────
  build-push:
    name: "Stage 2 · Build & Push ECR"
    runs-on: ubuntu-latest
    needs: dependency-prediction
    if: needs.dependency-prediction.outputs.safe_to_proceed != 'false'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_uri: ${{ steps.push.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build metadata
        id: meta
        run: |
          TAG="${{ github.sha }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        id: push
        run: |
          ECR_URL="${{ needs.dependency-prediction.outputs.ecr_url }}"
          TAG="${{ steps.meta.outputs.tag }}"
          IMAGE_URI="${ECR_URL}:${TAG}"

          docker build -t "$IMAGE_URI" .
          docker tag "$IMAGE_URI" "${ECR_URL}:latest"
          docker push "$IMAGE_URI"
          docker push "${ECR_URL}:latest"

          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "Built and pushed: $IMAGE_URI"

  # ── Stage 3: Self-Heal on build failure ───────────────────────────────────
  self-heal-build:
    name: "Stage 3 · Self-Heal (build fail)"
    runs-on: ubuntu-latest
    needs: [dependency-prediction, build-push]
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Claude diagnose and fix build failure
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DOCKERFILE=$(cat Dockerfile 2>/dev/null || echo "not found")
          PKGJSON=$(cat package.json 2>/dev/null || echo "not found")

          python3 - <<'PYEOF'
          import os, json, urllib.request, glob

          dockerfile = open("Dockerfile").read() if os.path.exists("Dockerfile") else "not found"
          pkgjson = open("package.json").read() if os.path.exists("package.json") else "not found"

          prompt = f"""Fix a Docker build failure for a Next.js app on ECS.
          Dockerfile:
          {dockerfile}
          package.json:
          {pkgjson}
          Common issues: missing output: standalone in next.config, wrong Node version, missing COPY steps.
          Respond ONLY with JSON: {{"root_cause": "...", "fix_description": "...", "file_patches": [{{"filename": "Dockerfile", "search": "...", "replace": "..."}}], "commit_message": "fix: ..."}}"""

          payload = json.dumps({"model": "claude-sonnet-4-20250514", "max_tokens": 1000, "messages": [{"role": "user", "content": prompt}]}).encode()
          req = urllib.request.Request("https://api.anthropic.com/v1/messages", data=payload,
              headers={"Content-Type": "application/json", "x-api-key": os.environ["ANTHROPIC_API_KEY"], "anthropic-version": "2023-06-01"})
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())
          text = data["content"][0]["text"].strip()
          if "```" in text:
              text = text.split("```")[1]
              if text.startswith("json"): text = text[4:]
          fix = json.loads(text.strip())
          print(json.dumps(fix, indent=2))
          for patch in fix.get("file_patches", []):
              fn = patch["filename"]
              if os.path.exists(fn):
                  with open(fn) as fp: c = fp.read()
                  if patch["search"] in c:
                      with open(fn, "w") as fp: fp.write(c.replace(patch["search"], patch["replace"], 1))
          with open("/tmp/commit_msg.txt", "w") as fp: fp.write(fix.get("commit_message", "fix: auto-heal frontend"))
          with open("/tmp/root_cause.txt", "w") as fp: fp.write(fix.get("root_cause", "unknown"))
          PYEOF

          BRANCH="fix/auto-heal-frontend-$(date +%Y%m%d-%H%M%S)"
          git config user.name "Autonomous SRE Bot"
          git config user.email "sre-bot@autonomous-sre.io"
          git checkout -b "$BRANCH"
          git add -A
          git diff --staged --quiet || git commit -m "$(cat /tmp/commit_msg.txt)"
          git push origin "$BRANCH"
          gh pr create --title "🤖 Auto-heal frontend: $(cat /tmp/commit_msg.txt)" \
            --body "Root cause: $(cat /tmp/root_cause.txt)" \
            --head "$BRANCH" --base main --label "auto-heal" || true

  # ── Stage 4: Deploy to ECS + War Room on failure ──────────────────────────
  deploy:
    name: "Stage 4 · Deploy to ECS"
    runs-on: ubuntu-latest
    needs: [dependency-prediction, build-push]
    if: github.ref == 'refs/heads/main'
    outputs:
      deploy_status: ${{ steps.deploy.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS service
        id: deploy
        run: |
          aws ecs update-service \
            --cluster "${{ env.CLUSTER_NAME }}" \
            --service "${{ env.SERVICE_NAME }}" \
            --force-new-deployment \
            --region "${{ env.AWS_REGION }}"

          echo "Waiting for deployment to stabilize..."
          set +e
          aws ecs wait services-stable \
            --cluster "${{ env.CLUSTER_NAME }}" \
            --services "${{ env.SERVICE_NAME }}" \
            --region "${{ env.AWS_REGION }}"
          WAIT_CODE=$?

          if [ $WAIT_CODE -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "Deployment stable!"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "Deployment failed or timed out"
            exit 1
          fi

  # ── Stage 5: War Room triggered on deploy failure ─────────────────────────
  war-room:
    name: "Stage 5 · Multi-Agent War Room"
    runs-on: ubuntu-latest
    needs: deploy
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Multi-Agent War Room
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLUSTER: ${{ env.CLUSTER_NAME }}
          SERVICE: ${{ env.SERVICE_NAME }}
          IMAGE_URI: ${{ needs.build-push.outputs.image_uri }}
        run: |
          pip install boto3 --quiet
          python3 /dev/stdin <<'PYEOF'
          import os, json, boto3, urllib.request, datetime

          ANTHROPIC_API_KEY = os.environ["ANTHROPIC_API_KEY"]
          CLUSTER = os.environ.get("CLUSTER", "autonomous-sre-cluster")
          SERVICE = os.environ.get("SERVICE", "autonomous-sre-frontend")
          REGION = "us-east-1"
          IMAGE_URI = os.environ.get("IMAGE_URI", "unknown")

          def claude(messages, system="You are an expert SRE.", max_tokens=1000):
              payload = json.dumps({
                  "model": "claude-sonnet-4-20250514",
                  "max_tokens": max_tokens,
                  "system": system,
                  "messages": messages
              }).encode()
              req = urllib.request.Request(
                  "https://api.anthropic.com/v1/messages", data=payload,
                  headers={"Content-Type": "application/json", "x-api-key": ANTHROPIC_API_KEY, "anthropic-version": "2023-06-01"}
              )
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())["content"][0]["text"]

          print("\n" + "="*60)
          print("🚨 WAR ROOM ACTIVATED")
          print("="*60)

          # ── Agent 1: Log Analyst ──────────────────────────────────────
          print("\n[Agent 1: Log Analyst] Fetching ECS task logs...")
          ecs_events = []
          cw_logs = "No logs available"
          try:
              ecs = boto3.client("ecs", region_name=REGION)
              cw = boto3.client("logs", region_name=REGION)

              # Get stopped tasks
              tasks_resp = ecs.list_tasks(cluster=CLUSTER, serviceName=SERVICE, desiredStatus="STOPPED")
              if tasks_resp["taskArns"]:
                  desc = ecs.describe_tasks(cluster=CLUSTER, tasks=tasks_resp["taskArns"][:2])
                  for t in desc["tasks"]:
                      for c in t.get("containers", []):
                          reason = c.get("reason", "")
                          exit_code = c.get("exitCode", "?")
                          ecs_events.append(f"Container {c['name']}: exitCode={exit_code}, reason={reason}")

              # Get recent CloudWatch logs
              log_group = "/ecs/autonomous-sre"
              streams = cw.describe_log_streams(logGroupName=log_group, orderBy="LastEventTime", descending=True, limit=1)
              if streams["logStreams"]:
                  stream = streams["logStreams"][0]["logStreamName"]
                  events = cw.get_log_events(logGroupName=log_group, logStreamName=stream, limit=50, startFromHead=False)
                  cw_logs = "\n".join([e["message"] for e in events["events"][-20:]])
          except Exception as e:
              ecs_events = [f"Could not fetch ECS data: {e}"]

          log_analysis = claude(
              messages=[{"role": "user", "content": f"""Analyze this ECS deployment failure for service {SERVICE}.

          ECS task events: {json.dumps(ecs_events)}
          Recent CloudWatch logs:
          {cw_logs[:2000]}
          Deployed image: {IMAGE_URI}

          Identify: 1) crash reason, 2) whether it's a code bug, config issue, or infrastructure problem, 3) severity (CRITICAL/HIGH/MEDIUM).
          Be concise, max 200 words."""}],
              system="You are a log analysis agent specializing in ECS Fargate failures."
          )
          print(f"\n[Agent 1 Report]\n{log_analysis}")

          # ── Agent 2: Blast Radius ─────────────────────────────────────
          print("\n[Agent 2: Blast Radius Agent] Computing impact...")
          blast_analysis = claude(
              messages=[{"role": "user", "content": f"""Blast radius assessment for failed frontend service in autonomous-sre.

          Dependency graph:
          repo1-base-infra → repo2-app-infra → repo3-frontend (FAILED) → user traffic
                                             → repo4-backend (still running)

          Failed service: {SERVICE} on cluster {CLUSTER}
          Log analysis summary: {log_analysis[:500]}

          Assess:
          1. Which users/services are affected RIGHT NOW?
          2. Is the backend API still reachable directly?
          3. Risk of cascading to repo4?
          4. Estimated blast radius: percentage of traffic affected.

          Respond concisely, max 150 words."""}],
              system="You are a blast radius estimation agent for distributed ECS deployments."
          )
          print(f"\n[Agent 2 Report]\n{blast_analysis}")

          # ── Agent 3: Orchestrator (synthesizes + decides action) ──────
          print("\n[Agent 3: Orchestrator] Synthesizing war room report...")
          orchestrator_report = claude(
              messages=[{"role": "user", "content": f"""You are the war room orchestrator. Synthesize findings and decide action.

          Log Analysis:
          {log_analysis}

          Blast Radius:
          {blast_analysis}

          Available actions:
          1. ROLLBACK - revert ECS service to previous task definition
          2. REDEPLOY - force new deployment with same image
          3. SCALE_DOWN - reduce desired count to 0, investigate manually
          4. HOTFIX_PR - generate code fix and raise PR

          Respond ONLY with JSON:
          {{
            "action": "ROLLBACK|REDEPLOY|SCALE_DOWN|HOTFIX_PR",
            "reason": "one sentence",
            "estimated_recovery_minutes": 5,
            "hotfix_needed": true/false,
            "summary": "war room summary for engineers"
          }}"""}],
              system="You are the war room orchestrator for an autonomous SRE system. Be decisive."
          )
          print(f"\n[Orchestrator Decision]\n{orchestrator_report}")

          # Parse decision
          try:
              clean = orchestrator_report.strip()
              if "```" in clean:
                  clean = clean.split("```")[1]
                  if clean.startswith("json"): clean = clean[4:]
              decision = json.loads(clean.strip())
          except:
              decision = {"action": "ROLLBACK", "reason": "parse error, defaulting to rollback"}

          action = decision.get("action", "ROLLBACK")

          # ── Execute action ────────────────────────────────────────────
          print(f"\n[Remediation Agent] Executing: {action}")
          ecs_client = boto3.client("ecs", region_name=REGION)

          if action == "ROLLBACK":
              try:
                  # Get previous task def
                  svc = ecs_client.describe_services(cluster=CLUSTER, services=[SERVICE])["services"][0]
                  current_td = svc["taskDefinition"]
                  family = current_td.rsplit(":", 1)[0].split("/")[-1]
                  current_rev = int(current_td.rsplit(":", 1)[1])
                  if current_rev > 1:
                      prev_td = f"{family}:{current_rev - 1}"
                      ecs_client.update_service(cluster=CLUSTER, service=SERVICE, taskDefinition=prev_td)
                      print(f"Rolled back to {prev_td}")
                  else:
                      print("No previous revision to roll back to")
              except Exception as e:
                  print(f"Rollback failed: {e}")

          elif action == "REDEPLOY":
              try:
                  ecs_client.update_service(cluster=CLUSTER, service=SERVICE, forceNewDeployment=True)
                  print("Force redeployment triggered")
              except Exception as e:
                  print(f"Redeploy failed: {e}")

          elif action == "SCALE_DOWN":
              try:
                  ecs_client.update_service(cluster=CLUSTER, service=SERVICE, desiredCount=0)
                  print("Scaled down to 0")
              except Exception as e:
                  print(f"Scale down failed: {e}")

          # Write war room report summary
          with open("/tmp/war_room_report.txt", "w") as fp:
              fp.write(f"WAR ROOM REPORT — {datetime.datetime.utcnow().isoformat()}\n")
              fp.write(f"Service: {SERVICE}\n")
              fp.write(f"Action taken: {action}\n")
              fp.write(f"Reason: {decision.get('reason', 'N/A')}\n\n")
              fp.write(f"LOG ANALYSIS:\n{log_analysis}\n\n")
              fp.write(f"BLAST RADIUS:\n{blast_analysis}\n\n")
              fp.write(f"ORCHESTRATOR DECISION:\n{orchestrator_report}\n")

          print("\n" + "="*60)
          print("WAR ROOM COMPLETE")
          print(f"Action taken: {action}")
          print("="*60)
          PYEOF

      - name: Create war room incident issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT=$(cat /tmp/war_room_report.txt 2>/dev/null | head -60 || echo "Report unavailable")
          gh issue create \
            --title "🚨 Incident: Frontend deployment failure $(date +%Y-%m-%d)" \
            --body "## War Room Incident Report

          **Triggered:** Automated war room on failed ECS deployment
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          \`\`\`
          $REPORT
          \`\`\`

          > This issue was auto-created by the Autonomous SRE war room." \
            --label "incident,auto-heal" || true
